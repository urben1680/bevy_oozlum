name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV (minimal check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: msrv

      - name: cargo check with default features
        run: cargo check --all-targets --all-features

      - name: cargo check without default features
        run: cargo check --all-targets --no-default-features

  stable:
    name: Stable (full checks)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
      RUSTDOCFLAGS: "-D warnings -D missing_docs -D rustdoc::broken_intra_doc_links"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- \
          -D warnings \
          -D clippy::undocumented_unsafe_blocks \
          -D clippy::missing_safety_doc \
          -D unsafe_op_in_unsafe_fn

      - name: Tests
        run: cargo test --all-targets --all-features

      - name: Documentation
        run: cargo doc --all-features --no-deps

      - name: Example game (CI mode)
        run: cargo run --example game --features ci-mode,track-update-logs
