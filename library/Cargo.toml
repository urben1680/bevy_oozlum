[package]
name = "library"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy = { git = "https://github.com/raldone01/bevy-rs", branch = "better-bevy-manifest" } # todo: switch to main after https://github.com/bevyengine/bevy/issues/17612
variadics_please = "1.1"
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
rand = "0.8.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
crossterm = "0.28"

[features]
default = ["serde"] # todo: remove line before release
serde = ["dep:serde", "bevy/serialize"]
