[package]
name = "bevy_oozlum"
version = "0.1.0"
edition = "2024"
rust-version = "1.92.0" # keep in sync with bevy

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy_app = { version = "=0.18", optional = true }
bevy_ecs = "=0.18"
bevy_log = "=0.18"
bevy_platform = "=0.18"
bevy_ptr = "=0.18" 
bevy_reflect = { version = "=0.18", optional = true }
bevy_utils = "=0.18"
nonmax = { version = "0.5", default-features = false } # keep in sync with bevy
variadics_please = "1.1" # keep in sync with bevy

[dev-dependencies]
bevy = { version = "=0.18", features = ["track_location", "debug"] }

[features]
default = ["bevy_app", "bevy_reflect"]
bevy_app = ["dep:bevy_app"]
bevy_reflect = ["dep:bevy_reflect"]
