[package]
name = "library"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy = "0.16.0-rc.1" # todo: replace with subcrates (ecs, log, platform_support, reflect, app, utils, ptr)
variadics_please = "1.1"
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
crossterm = "0.28"
bevy_mod_debugdump = { git = "https://github.com/mnmaita/bevy_mod_debugdump.git", branch = "mnmaita/bevy-0.16" } # todo: remove before release

[features]
default = ["serde"] # todo: remove line before release
serde = ["dep:serde", "bevy/serialize"]
