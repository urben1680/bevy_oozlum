[package]
name = "bevy_oozlum"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy_app = { version = "=0.17.0-rc.2", optional = true }
bevy_ecs = "=0.17.0-rc.2"
bevy_log = "=0.17.0-rc.2"
bevy_platform = "=0.17.0-rc.2"
bevy_ptr = "=0.17.0-rc.2" 
bevy_reflect = { version = "=0.17.0-rc.2", optional = true }
bevy_utils = "=0.17.0-rc.2"
nonmax = { version = "0.5", default-features = false } # keep in sync with bevy
variadics_please = "1.1"

[dev-dependencies]
crossterm = "0.28"
bevy = { version = "=0.17.0-rc.2", features = ["track_location"] }

[features]
default = ["bevy_app", "bevy_reflect"]
bevy_reflect = ["dep:bevy_reflect"]
bevy_app = ["dep:bevy_app"]
