[package]
name = "library"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy = { git = "https://github.com/urben1680/bevy", branch = "public-register-dynamic-bundle" }
variadics_please = "1.1"
fixedbitset = "0.5" # keep this in sync with bevy
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
rand = "0.8.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
crossterm = "0.28"

[features]
default = ["serde"] # todo: remove line before release
serde = ["dep:serde", "bevy/serialize"]
