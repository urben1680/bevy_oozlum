[package]
name = "bevy_oozlum"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy = { git = "https://github.com/bevyengine/bevy.git", branch = "main" } # todo: replace with subcrates (ecs, log, platform_support, reflect, app, utils, ptr)
variadics_please = "1.1"
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
crossterm = "0.28"

[features]
default = ["serialize"] # todo: remove line before release
serialize = ["dep:serde", "bevy/serialize"]
