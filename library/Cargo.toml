[package]
name = "library"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bevy = "0.15.1"
serde = { version = "1.0", features = ["derive"], optional = true }
thiserror = "2"

[dev-dependencies]
rand = "0.8.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = ["serde"] # todo: remove line before release
serde = ["dep:serde"]
packed_rev_frame_size_1 = []
packed_rev_frame_size_2 = []
packed_rev_frame_size_3 = []
